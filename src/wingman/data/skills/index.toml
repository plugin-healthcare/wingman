# Curated theme index for wingman's skill picker.
#
# Each [sets.<theme>] entry is a selectable theme in `wingman init` /
# `wingman add` and in `wingman skill add <theme>`. Selecting a theme installs
# ALL of its skills.
#
# Two ways to declare a theme's skills:
#
#   1. Directory glob — every */SKILL.md under `path` is a member:
#        [sets.<theme>]
#        repo    = "https://github.com/<owner>/<repo>"
#        path    = "<dir holding the skill folders>"
#        ref     = "<branch|tag|sha>"   # optional, defaults to repo default branch
#        include = ["<skill>", …]       # optional, only these members
#        exclude = ["<skill>", …]       # optional, skip these members
#
#   2. Explicit members — for repos where skills live at unrelated subpaths:
#        [sets.<theme>]
#        repo    = "https://github.com/<owner>/<repo>"
#        ref     = "<branch|tag|sha>"   # optional
#        members = [
#          { name = "<skill>", path = "<subdir holding SKILL.md>" },
#          …
#        ]
#
# `packages` links a theme to PyPI package names so `wingman sync` installs it
# automatically when those packages are present.
#
# A skill's name must equal its upstream folder name (it must match the `name:`
# in its SKILL.md; `wingman audit` checks this). For a one-off skill not worth a
# theme, use `wingman skill add <git-url> --path <subdir>`.

[sets.duckdb]
repo = "https://github.com/duckdb/duckdb-skills"
path = "skills"
ref = "main"
exclude = ["read-memories"]
description = "All official DuckDB skills (query, read-file, attach-db, convert, spatial, …)."
packages = ["duckdb"]

[sets.streamlit]
repo = "https://github.com/streamlit/agent-skills"
path = "."
ref = "main"
description = "Official Streamlit skill for building, styling, and deploying apps."
packages = ["streamlit"]

[sets.dagster]
repo = "https://github.com/dagster-io/skills"
ref = "master"
description = "Dagster expert guidance plus dignified production-Python standards."
packages = ["dagster"]
members = [
    { name = "dagster-expert", path = "skills/dagster-expert/skills/dagster-expert" },
    { name = "dignified-python", path = "skills/dignified-python/skills/dignified-python" },
]

[sets.agent-tooling]
repo = "https://github.com/anthropics/skills"
path = "skills"
ref = "main"
include = ["skill-creator", "mcp-builder"]
description = "Author Agent Skills and build MCP servers."

[sets.developing]
repo = "https://github.com/anthropics/skills"
path = "skills"
ref = "main"
include = ["webapp-testing"]
description = "Test and debug local web apps with Playwright."

[sets.likec4]
repo = "https://github.com/likec4/likec4"
path = "skills"
ref = "main"
include = ["likec4-dsl"]
description = "LikeC4 architecture-as-code DSL reference for .c4/.likec4 files."
