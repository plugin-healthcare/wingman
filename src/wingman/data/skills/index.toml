# Curated skill index for `wingman skill add <name>`.
#
# Each entry maps a short name to a git source. `wingman skill add <name>`
# resolves the name here; `wingman skill add <git-url> --path <subdir>` works
# without an index entry. See available entries with `wingman skill list --all`.
#
# Schema per skill:
#   [skills.<name>]
#   repo        = "https://github.com/<owner>/<repo>"  # git URL
#   path        = "<subdir>"                            # folder holding SKILL.md
#   ref         = "<branch|tag|sha>"                    # optional, defaults to repo default branch
#   description = "<one line>"                          # optional, shown in `skill list --all`
#
# Keep the skill name equal to its upstream folder name so it matches the
# `name:` in its SKILL.md (wingman audit checks this).
#
# Sets bundle every skill under a directory. `wingman skill add <set>` installs
# them all at once, recording each individually:
#   [sets.<name>]
#   repo    = "https://github.com/<owner>/<repo>"
#   path    = "<dir holding the skill folders>"
#   ref     = "<branch|tag|sha>"   # optional
#   exclude = ["<skill>", …]       # optional, skip these members
#   include = ["<skill>", …]       # optional, only these members

[sets.duckdb]
repo = "https://github.com/duckdb/duckdb-skills"
path = "skills"
ref = "main"
exclude = ["read-memories"]
description = "All official DuckDB skills (query, read-file, attach-db, …)."

[sets.streamlit]
repo = "https://github.com/streamlit/agent-skills"
path = "."
ref = "main"
description = "Official Streamlit skill for building, styling, and deploying apps."

